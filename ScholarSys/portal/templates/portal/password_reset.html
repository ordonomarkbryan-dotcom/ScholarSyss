{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScholarSys+ | Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-black: #000000;
            --bg-white: #ffffff;
            --bg-light: #f9fafb;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-main);
        }

        .login-card {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 400px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        h1 {
            color: var(--primary-black);
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -2px;
            text-transform: uppercase;
            font-size: 2.22rem;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--bg-light);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
            font-weight: 500;
        }

        input:focus {
            background: white;
            border-color: var(--primary-black);
            box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.05);
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary-black);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .login-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .footer {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .footer a {
            color: var(--primary-black);
            text-decoration: none;
            font-weight: 700;
            border-bottom: 2px solid var(--primary-black);
        }
    </style>
</head>

<body>
    <div class="login-card">
        <h1>
            <span style="color: black;">Scholar</span><span style="color: #6b7280;">Sys+</span>
        </h1>
        <p>Enter your email to reset your password.</p>
        <form method="POST">
            {% csrf_token %}
            <div class="input-group">
                <label>Email Address</label>
                {{ form.email }}
            </div>
            <button type="submit" class="login-btn">Send Reset Link</button>
        </form>
        <div class="footer">
            <a href="{% url 'login' %}">&larr; Back to Login</a>
        </div>
    </div>
</body>

</html>
