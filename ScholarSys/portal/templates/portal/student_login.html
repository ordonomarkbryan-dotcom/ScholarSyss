{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScholarSys+ | Student Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-black: #000000;
            --card-white: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-light: #e5e7eb;
            --accent-black: #000000;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-black) !important;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .login-card {
            background: var(--card-white) !important;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            width: 400px;
            text-align: center;
            animation: fadeIn 0.6s ease-out;
            border: 1px solid var(--border-light);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        h1 {
            color: var(--text-main);
            font-weight: 800;
            margin-bottom: 0.2rem;
            letter-spacing: -2.5px;
            font-size: 2.2rem;
        }

        .portal-label {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: #f9fafb;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            color: var(--text-main);
            box-sizing: border-box;
            outline: none;
            transition: 0.2s;
            font-size: 1rem;
        }

        input:focus {
            background: white;
            border-color: var(--accent-black);
            box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.05);
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: var(--accent-black) !important;
            color: white !important;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 1rem;
        }

        .login-btn:hover {
            background: #262626 !important;
            transform: translateY(-1px);
        }

        .footer {
            margin-top: 2rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid #f3f4f6;
            padding-top: 1.5rem;
        }

        .footer a {
            color: var(--accent-black);
            text-decoration: none;
            font-weight: 700;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: 0.2s;
        }

        .back-link:hover {
            color: var(--text-main);
        }
    </style>
</head>

<body>
    <div class="login-card">
        <a href="{% url 'login' %}" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Gateway</a>

        <h1>Scholar<span style="color: #6b7280;">Sys+</span></h1>
        <span class="portal-label">Student Portal</span>

        {% if messages %}
        {% for message in messages %}
        <div
            style="padding: 0.8rem; border-radius: 8px; background: #000; color: white; font-size: 0.85rem; margin-bottom: 1rem; border: 1px solid #374151;">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="input-group">
                <label>Username or Email</label>
                <input type="text" name="identifier" placeholder="Enter your credentials" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <div style="position: relative;">
                    <input type="password" name="password" id="password" placeholder="••••••••" required>
                    <i class="fa-solid fa-eye" id="togglePassword"
                        style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #9ca3af; cursor: pointer;"></i>
                </div>
            </div>
            <button type="submit" class="login-btn">Sign In as Student</button>
        </form>

        <div class="footer">
            <a href="{% url 'password_reset' %}">Forgot password?</a><br><br>
            Don't have an account? <a href="/signup/?role=student">Sign up here</a>
        </div>
    </div>

    <script>
        const togglePassword = document.getElementById('togglePassword');
        const passwordField = document.getElementById('password');

        if (togglePassword && passwordField) {
            togglePassword.addEventListener('click', function () {
                const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordField.setAttribute('type', type);
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });
        }
    </script>
</body>

</html>
